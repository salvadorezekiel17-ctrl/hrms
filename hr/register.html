<!DOCTYPE html>
<html>
<head><title>Register Employee</title>
    <link rel="icon" type="image/x-icon" href="CKL-1.PNG">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/hr.css">
</head>
<body>
<div class="container">
    <h2>Create Employee Account</h2>
    <form id="registerForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="employee_id" placeholder="Employee ID (e.g. EMP123)" required>
        <input type="text" id="position" placeholder="Position" required>
        <select id="role">
            <option value="employee">Employee</option>
            <option value="team_leader">Team Leader</option>
            <option value="coordinator">Coordinator</option>
            <option value="hr">HR</option>
            <option value="admin">Admin</option>
        </select>
        <input type="password" id="password" placeholder="Default password" value="password" required>
        <button type="submit">Create Account</button>
    </form>
    <div id="message"></div>
</div>

    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/forms.js"></script>
    <script src="../js/register.js"></script>
</body>
</html>
