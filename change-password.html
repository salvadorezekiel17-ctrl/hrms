<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="password.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | CKL HRMS</title>
</head>
<body>
    <div class="container">
        <h1>Change Password</h1>
        <p class="sub">For your account security, please change your default password.</p>

        <form id="changePasswordForm">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPassword" placeholder="Enter your current password" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password (min. 6 characters)" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your new password" required>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Change Password</button>
            <div id="message" class="message"></div>
            <a href="javascript:history.back()" class="back-link">← Back</a>
        </form>
    </div>

    
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/forms.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
