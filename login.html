<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CKL HRMS</title>
    <link rel="icon" type="image/x-icon" href="CKL-1.PNG">
    <link rel="stylesheet" href="css/global.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="logo">
            <h2>CKL HRMS</h2>
            <p>Construction Services</p>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your account</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="off">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
            <div id="message" class="message"></div>
        </form>

        <div class="footer">
            <div>
                <a href="/hrms/apply.html" class="btn-apply">Apply Now</a>
                <br>
                <a href="/hrms/status.html" class="btn-status">Check Application Status</a>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/forms.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
