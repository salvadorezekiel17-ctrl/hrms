<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/teamleader.css">
    
    <title>File a Leave | TL</title>
    <link rel="icon" type="image/x-icon" href="CKL-1.PNG">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h2>CKL HRMS</h2><p>Construction Services</p></div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="dashboard.php"> Dashboard</a></li>
            <li class="nav-item"><a href="attendance-history.html"> My Attendance</a></li>
            <li class="nav-item"><a href="for-validation.html"> For Validation</a></li>
            <li class="nav-item"><a href="deployment-history.html"> Past Deployments</a></li>
            <li class="nav-item active"><a href="file-leave.html"> File a Leave</a></li>
            <li class="nav-item"><a href="payslips.html"> My Payslips</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">File a Leave</div>
            <div class="user-info">
                <span>Team Leader</span>
                <a href="../index.html" class="logout-btn">Logout</a>
            </div>
        </div>
        <div class="container">
            <div class="panel">
                <h2>Submit New Leave Request</h2>
                <div class="form-group">
                    <label>Employee Name</label>
                    <input type="text" id="employeeName">
                </div>
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" id="employeeId">
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <input type="text" id="position">
                </div>
                <div class="form-group">
                    <label>Leave Type</label>
                    <select id="leaveType">
                        <option>Sick Leave</option>
                        <option>Vacation Leave</option>
                        <option>Emergency Leave</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate">
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="endDate">
                </div>
                <div class="form-group">
                    <label>Reason</label>
                    <textarea id="reason" rows="2"></textarea>
                </div>
                <button id="submitLeave" class="btn-leave">Submit Request</button>
                <div id="submitMessage" style="margin-top:8px;"></div>
            </div>
            <div class="panel">
                <h2>My Leave History</h2>
                <div style="overflow-x: auto;">
                    <table id="historyTable">
                        <thead><tr><th>Name</th><th>ID</th><th>Position</th><th>Type</th><th>Start</th><th>End</th><th>Reason</th><th>Status</th></tr></thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/file-leave.js"></script>
</body>
</html>
